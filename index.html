<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="게임과 기록을 위한 반응형 개인 웹사이트">
  <title>Fish Eat Fish</title>
  <link rel="stylesheet" href="styles.css">
  <script src="script.js" defer></script>
  <script src="game.js" defer></script>
</head>
<body>
  <header class="site-header">
    <a class="brand" href="#home" aria-label="홈으로 이동">FISH / FISH</a>
    <nav aria-label="주요 메뉴">
      <a href="#home">Home</a>
      <a href="#games">Games</a>
    </nav>
  </header>

  <main>
    <section id="home" class="hero" aria-labelledby="hero-title">
      <p class="eyebrow">PERSONAL ARCADE</p>
      <h1 id="hero-title">나의 기록을<br><span>게임으로 만나요.</span></h1>
      <p class="intro">별명과 최고 스코어를 기록하는 반응형 게임 공간입니다.</p>
      <a class="button" href="#games">Games 시작하기</a>
    </section>

    <section id="games" class="games-panel" aria-labelledby="games-title">
      <div>
        <p class="eyebrow">GAMES</p>
        <h2 id="games-title">Fish Eat Fish</h2>
        <p>작은 물고기를 먹고 성장하세요. 지렁이는 레벨업 간식이고, 더 큰 물고기에게 먹히면 게임이 끝납니다.</p>
        <label class="nickname-label" for="nickname">별명</label>
        <input id="nickname" maxlength="16" placeholder="별명을 입력하세요" autocomplete="nickname">
        <div class="scoreboard" aria-live="polite">
          <span>점수 <strong id="score">0</strong></span>
          <span>최고 <strong id="high-score">0</strong></span>
          <span>레벨 <strong id="level">1</strong></span>
        </div>
        <button class="button game-button" id="start-game" type="button">게임 시작</button>
      </div>
      <div class="game-shell">
        <div class="canvas-wrap">
          <canvas id="game-canvas" width="800" height="500" aria-label="물고기 게임 화면"></canvas>
          <p class="game-message" id="game-message">게임 시작 버튼을 누르세요</p>
        </div>
        <div class="touch-controls" aria-label="모바일 게임 조작">
          <button type="button" data-direction="up" aria-label="위로 이동">▲</button>
          <button type="button" data-direction="left" aria-label="왼쪽으로 이동">◀</button>
          <button type="button" data-direction="down" aria-label="아래로 이동">▼</button>
          <button type="button" data-direction="right" aria-label="오른쪽으로 이동">▶</button>
        </div>
        <p class="controls-hint">화살표 키 또는 화면 버튼으로 이동하세요.</p>
      </div>
    </section>
  </main>
</body>
</html>
