<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="게임과 기록을 위한 반응형 개인 웹사이트">
  <title>Fish Eat Fish</title>
  <link rel="stylesheet" href="styles.css">
  <script src="script.js" defer></script>
</head>
<body>
  <header class="site-header">
    <a class="brand" href="#home" aria-label="홈으로 이동">FISH / FISH</a>
    <nav aria-label="주요 메뉴">
      <a href="#home">Home</a>
      <a href="#games">Games</a>
    </nav>
  </header>

  <main>
    <section id="home" class="hero" aria-labelledby="hero-title">
      <p class="eyebrow">PERSONAL ARCADE</p>
      <h1 id="hero-title">나의 기록을<br><span>게임으로 만나요.</span></h1>
      <p class="intro">별명과 최고 스코어를 기록하는 반응형 게임 공간입니다.</p>
      <a class="button" href="#games">Games 시작하기</a>
    </section>

    <section id="games" class="games-panel" aria-labelledby="games-title">
      <div>
        <p class="eyebrow">GAMES</p>
        <h2 id="games-title">Fish Eat Fish</h2>
        <p>게임 화면을 준비하고 있습니다. 게임 규칙과 조작은 다음 개발 루프에서 구현합니다.</p>
      </div>
      <div class="game-placeholder" role="status" aria-live="polite">GAME AREA / 준비 중</div>
    </section>
  </main>
</body>
</html>
